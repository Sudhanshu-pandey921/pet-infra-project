trigger: 
  - main

pool: may-pool

stages:
  - stage: FirstStage
    displayName: Init
    jobs:
      - job: terraforminit
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'may-sc'
              backendAzureRmStorageAccountName: 'maystg12'
              backendAzureRmContainerName: 'maycnt12'
              backendAzureRmKey: 'pet.tfstate'


  - stage: SecondStage
    displayName: Plan
    jobs:
      - job: terraformplan
        steps:
             - task: TerraformTask@5
               inputs:
                 provider: 'azurerm'
                 command: 'init'
                 backendServiceArm: 'may-sc'
                 backendAzureRmStorageAccountName: 'maystg12'
                 backendAzureRmContainerName: 'maycnt12'
                 backendAzureRmKey: 'pet.tfstate'

             - task: TerraformTask@5
               inputs:
                 provider: 'azurerm'
                 command: 'plan'
                 environmentServiceNameAzureRM: 'may-sc'

  - stage: LastStage
    displayName: Apply
    jobs:
      - job: terraformapply
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'may-sc'
              backendAzureRmStorageAccountName: 'maystg12'
              backendAzureRmContainerName: 'maycnt12'
              backendAzureRmKey: 'pet.tfstate'

          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve'
              environmentServiceNameAzureRM: 'may-sc'

