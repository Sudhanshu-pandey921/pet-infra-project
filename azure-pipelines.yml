trigger: none
pool: may-pool

#For Linting
stages:
  - stage: Lint
    displayName: tflint
    jobs:
      - job: terraformlint
        steps:
          - task: PowerShell@2
            inputs:
              targetType: 'inline'
              script: |
                # Download zip
                Invoke-WebRequest -Uri "https://github.com/terraform-linters/tflint/releases/latest/download/tflint_windows_amd64.zip" -OutFile "tflint.zip"
                
                # Extract zip
                Expand-Archive -Path "tflint.zip" -DestinationPath "tflint" -Force
                
                # Add TFLint folder to PATH (temporary for this session)
                $env:PATH += ";$(Get-Location)\tflint"
                
                # Verify (ab direct command chalega)
                tflint --version
